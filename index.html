<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSD AGENT</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#F5A623">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HSD AGENT">
<link rel="apple-touch-icon" href="/static/logo.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0F1117;--panel:#1A1D27;--card:#21253A;--border:#2D3150;
  --accent:#F5A623;--accent2:#E0941A;--green:#22C55E;--red:#EF4444;
  --text:#F1F5F9;--text2:#94A3B8;--text3:#475569;
  --hsd:#3B82F6;--hss:#F97316;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)}
.login-box{background:var(--card);padding:36px 32px;border-radius:16px;text-align:center;width:320px}
.login-box img{width:72px;height:72px;border-radius:12px;margin-bottom:12px}
.login-box h1{font-size:20px;font-weight:700;margin-bottom:4px}
.login-box p{color:var(--text2);font-size:13px;margin-bottom:20px}
.dots{background:var(--panel);border-radius:8px;padding:12px;font-size:20px;letter-spacing:8px;margin-bottom:16px;min-height:48px}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.numpad button{background:var(--panel);color:var(--text);border:none;border-radius:8px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;transition:.15s}
.numpad button:hover{filter:brightness(1.2)}
.numpad .btn-ok{background:var(--green);color:#0F1117}
.err-msg{color:var(--red);font-size:13px;min-height:20px}

/* MAIN LAYOUT */
#main-screen{display:none;flex:1;overflow:hidden}
.sidebar{width:185px;background:var(--panel);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:18px;text-align:center;border-bottom:1px solid var(--border)}
.sidebar-logo img{width:56px;height:56px;border-radius:10px;margin-bottom:8px}
.sidebar-logo h2{font-size:13px;font-weight:700}
.sidebar-logo span{color:var(--accent);font-size:11px}
.nav-btn{display:block;width:100%;background:none;border:none;color:var(--text3);text-align:left;padding:10px 16px;font-size:13px;cursor:pointer;transition:.15s;font-family:inherit}
.nav-btn:hover{background:var(--card)}
.nav-btn.active{background:var(--card);color:var(--accent)}
.nav-btn.locked{cursor:default;color:var(--text3)}
.pin-info{margin:8px;background:#13161F;border-radius:8px;padding:10px;font-size:10px;color:#3A4260}
.pin-info b{color:var(--text3);display:block;margin-bottom:4px}
.btn-logout{margin-top:auto;background:none;border:none;color:var(--text3);padding:10px 16px;text-align:left;font-size:12px;cursor:pointer;font-family:inherit}
.btn-logout:hover{color:var(--text)}

.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.page{display:none;flex:1;overflow:hidden;flex-direction:column}
.page.active{display:flex}

/* GUDANG PAGE */
.topbar{background:var(--panel);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.topbar h3{font-size:14px;font-weight:700}
#clock{color:var(--text2);font-size:12px}
.scroll-area{flex:1;overflow-y:auto;padding:16px}
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px}
@media(max-width:700px){.slots-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.slots-grid{grid-template-columns:1fr}.sidebar{width:60px}.sidebar-logo h2,.sidebar-logo span,.nav-btn span,.pin-info{display:none}}

.slot{background:var(--card);border-radius:10px;overflow:hidden;border:2px solid transparent}
.slot.filled{border-color:var(--green)}
.slot-header{height:4px}
.slot-title{text-align:center;padding:8px;font-size:12px;font-weight:700}
.slot-zone{background:var(--panel);margin:0 8px;border-radius:6px;padding:16px 8px;text-align:center;font-size:11px;color:var(--text3);cursor:pointer;transition:.15s;min-height:60px;display:flex;align-items:center;justify-content:center}
.slot-zone:hover{filter:brightness(1.15)}
.slot-zone.filled{color:var(--green);background:#1a2e1a}
.slot-clear{display:block;width:100%;background:none;border:none;color:var(--text3);font-size:11px;padding:6px;cursor:pointer;font-family:inherit}
.slot-clear:hover{color:var(--red)}

.output-bar{background:var(--card);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.output-bar span{flex:1;font-size:12px;color:var(--text3)}
.btn-change{background:var(--panel);color:var(--text2);border:none;border-radius:6px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:inherit}

.btn-process{width:100%;background:var(--accent);color:#0F1117;border:none;border-radius:10px;padding:18px;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-bottom:8px}
.btn-process:hover{background:var(--accent2)}
.btn-process:disabled{background:var(--text3);cursor:default}

.progress-bar-wrap{background:var(--panel);border-radius:6px;height:8px;overflow:hidden;margin-bottom:4px}
.progress-bar-fill{height:100%;background:var(--green);width:0%;transition:.3s}
.prog-label{font-size:11px;color:var(--text2);margin-bottom:8px}

.log-box{background:var(--panel);border-radius:8px;padding:12px;font-family:'Consolas',monospace;font-size:12px;color:#64748B;height:120px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.log-ok{color:var(--green)}
.log-err{color:var(--red)}
.log-info{color:var(--accent)}

.result-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.btn-open{background:var(--green);color:#0F1117;border:none;border-radius:8px;padding:14px;font-size:13px;font-weight:700;cursor:pointer}
.btn-reset{background:var(--panel);color:var(--text2);border:none;border-radius:8px;padding:14px;font-size:13px;cursor:pointer}

/* COMING SOON */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:12px}
.coming-soon .icon{font-size:48px}
.coming-soon h2{font-size:18px;font-weight:700}
.coming-soon p{color:var(--text2);font-size:13px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="install-banner" style="display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#F5A623;color:#0F1117;padding:12px 24px;border-radius:30px;font-weight:700;font-size:13px;cursor:pointer;z-index:9999;gap:10px;align-items:center" onclick="installApp()">📲 Install App HSD AGENT</div>
<div id="login-screen">
  <div class="login-box">
    <img src="/static/logo.png" onerror="this.style.display='none'" id="logo-img">
    <h1>HSD AGENT</h1>
    <p>Masukkan PIN Divisi</p>
    <div class="dots" id="dots">○  ○  ○  ○</div>
    <div class="numpad">
      <button onclick="press('1')">1</button><button onclick="press('2')">2</button><button onclick="press('3')">3</button>
      <button onclick="press('4')">4</button><button onclick="press('5')">5</button><button onclick="press('6')">6</button>
      <button onclick="press('7')">7</button><button onclick="press('8')">8</button><button onclick="press('9')">9</button>
      <button onclick="press('⌫')">⌫</button><button onclick="press('0')">0</button>
      <button class="btn-ok" onclick="press('✓')">✓</button>
    </div>
    <div class="err-msg" id="err-msg"></div>
    <div class="pin-info" id="login-pin-info" style="margin-top:12px;text-align:left"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen" style="display:none;flex:1;overflow:hidden;display:none">
  <div style="display:flex;height:100vh">
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="/static/logo.png" onerror="this.style.display='none'">
      <h2>HSD AGENT</h2>
      <span id="role-label">-</span>
    </div>
    <div style="border-bottom:1px solid var(--border)"></div>
    <button class="nav-btn active" id="nav-gudang" onclick="goto('gudang')">📦  Gudang</button>
    <button class="nav-btn locked" id="nav-konten">🔒  Konten</button>
    <button class="nav-btn locked" id="nav-live">🔒  Live</button>
    <div style="border-top:1px solid var(--border);margin:4px 0"></div>
    <div class="pin-info" id="pin-info-box"></div>
    <button class="btn-logout" onclick="logout()">🚪  Keluar / Ganti PIN</button>
  </div>
  <div class="content">
    <!-- GUDANG -->
    <div class="page active" id="page-gudang">
      <div class="topbar">
        <h3>📦  Upload PDF Resi per Waktu</h3>
        <span id="clock"></span>
      </div>
      <div class="scroll-area">
        <div class="slots-grid" id="slots-grid"></div>
        <div class="output-bar">
          <span>💾</span>
          <span id="out-label">Simpan otomatis di folder output</span>
        </div>
        <button class="btn-process" id="btn-process" onclick="startProcess()">⚡   PROSES PDF → EXCEL</button>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="pb"></div></div>
        <div class="prog-label" id="prog-label"></div>
        <div class="log-box" id="log-box"></div>
        <div id="result-area" style="display:none">
          <div class="result-btns">
            <button class="btn-open" onclick="downloadResult()">📥  Download Excel</button>
            <button class="btn-reset" onclick="resetAll()">🔄  Reset</button>
          </div>
        </div>
      </div>
    </div>
    <!-- KONTEN -->
    <div class="page" id="page-konten">
      <div class="coming-soon"><div class="icon">🚧</div><h2>Divisi Konten</h2><p>Segera hadir</p></div>
    </div>
    <!-- LIVE -->
    <div class="page" id="page-live">
      <div class="coming-soon"><div class="icon">🚧</div><h2>Divisi Live</h2><p>Segera hadir</p></div>
    </div>
  </div>
  </div>
</div>

<input type="file" id="file-input" accept=".pdf" style="display:none">

<script>
// PWA
if("serviceWorker" in navigator) navigator.serviceWorker.register("/static/sw.js");
let deferredPrompt;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;document.getElementById("install-banner").style.display="flex";});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;}document.getElementById("install-banner").style.display="none";}

let pin='', role='', currentJob=null, currentSlot=null, uploadedSlots={};
const SLOTS=[['HSD','PAGI'],['HSD','SIANG'],['HSD','SORE'],['HSS','PAGI'],['HSS','SIANG'],['HSS','SORE']];

// Clock
setInterval(()=>{
  const n=new Date();
  document.getElementById('clock').textContent=
    n.toLocaleDateString('id-ID')+' '+n.toLocaleTimeString('id-ID');
},1000);

// Load pins for display
fetch('/api/pins').then(r=>r.json()).then(pins=>{
  let html='<b>PIN DIVISI</b>';
  for(const k in pins) html+=`<div>${pins[k].label}: ${pins[k].pin}</div>`;
  document.getElementById('login-pin-info').innerHTML=html;
  document.getElementById('pin-info-box').innerHTML=html;
});

// PIN input
function press(k){
  if(k==='⌫'){pin=pin.slice(0,-1)}
  else if(k==='✓'){doLogin();return}
  else{if(pin.length>=6)return;pin+=k}
  updateDots();
}
function updateDots(){
  const n=pin.length;
  document.getElementById('dots').textContent='  '.join?
    Array.from({length:4},(_,i)=>i<n?'●':'○').join('  '):
    [].concat(Array(n).fill('●'),Array(Math.max(0,4-n)).fill('○')).join('  ');
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('login-screen').style.display!=='none'){
    if(e.key>='0'&&e.key<='9')press(e.key);
    else if(e.key==='Backspace')press('⌫');
    else if(e.key==='Enter')press('✓');
  }
});
async function doLogin(){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin})});
  const d=await r.json();
  if(d.success){
    role=d.role;
    document.getElementById('role-label').textContent=d.label;
    document.getElementById('login-screen').style.display='none';
    document.getElementById('main-screen').style.display='flex';
    setupNav(role);
    buildSlots();
    pin='';updateDots();
  } else {
    document.getElementById('err-msg').textContent='PIN salah, coba lagi';
    pin='';updateDots();
    setTimeout(()=>document.getElementById('err-msg').textContent='',1500);
  }
}
async function logout(){
  await fetch('/api/logout',{method:'POST'});
  document.getElementById('main-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  role='';uploadedSlots={};currentJob=null;
}

// Nav
function setupNav(role){
  const menus=['gudang','konten','live'];
  menus.forEach(m=>{
    const btn=document.getElementById('nav-'+m);
    const labels={'gudang':'📦  Gudang','konten':'🎬  Konten','live':'📡  Live'};
    if(role==='admin'||role===m){
      btn.classList.remove('locked');btn.onclick=()=>goto(m);
      btn.textContent=labels[m];
    } else {
      btn.classList.add('locked');btn.onclick=null;
      btn.textContent='🔒  '+labels[m].split('  ')[1];
    }
  });
}
function goto(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.getElementById('nav-'+page).classList.add('active');
}

// Slots
function buildSlots(){
  const grid=document.getElementById('slots-grid');
  grid.innerHTML='';
  SLOTS.forEach(([akun,waktu])=>{
    const key=akun+'_'+waktu;
    const color=akun==='HSD'?'var(--hsd)':'var(--hss)';
    const div=document.createElement('div');
    div.className='slot';div.id='slot-'+key;
    div.innerHTML=`
      <div class="slot-header" style="background:${color}"></div>
      <div class="slot-title">${akun}  ·  ${waktu}</div>
      <div class="slot-zone" id="zone-${key}" onclick="pickFile('${key}')">📄  Klik pilih PDF</div>
      <button class="slot-clear" onclick="clearSlot('${key}')">✕</button>`;
    grid.appendChild(div);
  });
}
function pickFile(key){
  currentSlot=key;
  const fi=document.getElementById('file-input');
  fi.onchange=async()=>{
    const f=fi.files[0];if(!f)return;
    const fd=new FormData();fd.append('file',f);fd.append('slot',key);
    const r=await fetch('/api/upload',{method:'POST',body:fd});
    const d=await r.json();
    if(d.success){
      uploadedSlots[key]={path:d.path,name:d.name,akun:key.split('_')[0],waktu:key.split('_')[1]};
      const n=d.name;const s=n.length>22?n.slice(0,22)+'…':n;
      document.getElementById('zone-'+key).textContent='✅  '+s;
      document.getElementById('zone-'+key).classList.add('filled');
      document.getElementById('slot-'+key).classList.add('filled');
    }
    fi.value='';
  };
  fi.click();
}
function clearSlot(key){
  delete uploadedSlots[key];
  document.getElementById('zone-'+key).textContent='📄  Klik pilih PDF';
  document.getElementById('zone-'+key).classList.remove('filled');
  document.getElementById('slot-'+key).classList.remove('filled');
}

// Process
async function startProcess(){
  const slots=Object.values(uploadedSlots);
  if(!slots.length){alert('Pilih minimal 1 PDF!');return;}
  document.getElementById('btn-process').disabled=true;
  document.getElementById('btn-process').textContent='⏳  Memproses...';
  document.getElementById('result-area').style.display='none';
  document.getElementById('pb').style.width='0%';
  document.getElementById('log-box').innerHTML='';
  addLog('▸ MULAI\n','log-info');
  const r=await fetch('/api/process',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slots})});
  const d=await r.json();
  currentJob=d.job_id;
  pollProgress();
}
function pollProgress(){
  if(!currentJob)return;
  fetch('/api/progress/'+currentJob).then(r=>r.json()).then(d=>{
    document.getElementById('pb').style.width=d.progress+'%';
    if(d.log_last) document.getElementById('prog-label').textContent='  '+d.log_last;
    if(d.log&&d.log.length){
      const box=document.getElementById('log-box');
      box.innerHTML='';
      d.log.forEach(l=>{
        const cls=l.startsWith('✓')?'log-ok':l.startsWith('SELESAI')?'log-ok':l.startsWith('ERROR')?'log-err':'';
        addLog(l+'\n',cls);
      });
    }
    if(d.status==='done'){
      document.getElementById('btn-process').disabled=false;
      document.getElementById('btn-process').textContent='⚡   PROSES PDF → EXCEL';
      document.getElementById('result-area').style.display='block';
      addLog(`\n▸ SELESAI ✓  —  ${d.resi} resi · ${d.qty} qty\n`,'log-ok');
    } else if(d.status==='error'){
      document.getElementById('btn-process').disabled=false;
      document.getElementById('btn-process').textContent='⚡   PROSES PDF → EXCEL';
      addLog('\n▸ ERROR: '+d.error+'\n','log-err');
    } else {
      setTimeout(pollProgress,800);
    }
  });
}
function addLog(msg,cls){
  const box=document.getElementById('log-box');
  const span=document.createElement('span');
  if(cls)span.className=cls;
  span.textContent=msg;
  box.appendChild(span);
  box.scrollTop=box.scrollHeight;
}
function downloadResult(){
  if(currentJob) window.location.href='/api/download/'+currentJob;
}
function resetAll(){
  uploadedSlots={};currentJob=null;
  buildSlots();
  document.getElementById('pb').style.width='0%';
  document.getElementById('prog-label').textContent='';
  document.getElementById('log-box').innerHTML='';
  document.getElementById('result-area').style.display='none';
}
</script>
</body>
</html>
